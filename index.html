<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>波羅夷 空却 HBD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. 開場黑幕與眼罩 -->
    <div id="audio-unlocker">
        <div class="eyelid top-eyelid"></div>
        <div class="eyelid bottom-eyelid"></div>
        <div class="unlock-prompt">點擊螢幕 爆誕開眼！</div>
    </div>

    <!-- 2. 雲層容器 -->
    <div class="cloud-wrapper">
        <img src="祥雲2.png" class="floating-cloud">
        <img src="祥雲2.png" class="floating-cloud">
        <img src="祥雲2.png" class="floating-cloud">
        <img src="祥雲2.png" class="floating-cloud">
    </div>

    <!-- 3. 文字內容 (請保留你原有的內容，例如 container) -->
    <div class="container" id="blast-text">
        <div class="left-date">
            <span class="char">令</span><span class="char">和</span><span class="char">八</span><span class="char">年</span>
        </div>
        <div class="right-date">
            <span class="char">八</span><span class="char">月</span><span class="char">二</span><span class="char">十</span><span class="char">一</span><span class="char">日</span>
        </div>
        <div class="center-text">
            <h1 class="fade-in-text">波羅夷 空却</h1>
            <p class="fade-in-text sub-title">お誕生日おめでとう！</p>
        </div>
    </div>

    <!-- 4. 空嚴寺章 (請確保檔案名為 stamp.png，若為其他名稱請更改此處) -->

<img src="素材/背景圖/stamp.png" class="stamp-seal" 
<img src="素材/背景圖/stamp.png" class="stamp-seal" alt="空嚴寺印">

    <!-- 5. JS 放在最底下 -->
    <script src="script.js"></script>
</body>
</html>
