<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>波羅夷 空却 HBD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 點擊解鎖暨電影級開眼動畫層 -->
    <div id="audio-unlocker">
        <!-- 這是上眼皮 -->
        <div class="eyelid top-eyelid"></div>
        <!-- 這是下眼皮 -->
        <div class="eyelid bottom-eyelid"></div>
        
        <!-- 提示文字 -->
        <div class="unlock-prompt">點擊螢幕 爆誕開眼！</div>
    </div>

    <!-- 爆誕文字（預設隱藏，點擊後 active 才跑） -->
    <div id="blast-text" class="epic-explosion">爆誕！！！！</div>

    <!-- 其餘原本的背景與前景組件保持不變 -->
    <!-- 祥雲2 -->
    <img src="素材/背景圖/祥雲2.png" class="cloud-float c1" alt="祥雲2">
    <img src="素材/背景圖/祥雲2.png" class="cloud-float c2" alt="祥雲2">
    <img src="素材/背景圖/祥雲2.png" class="cloud-float c3" alt="祥雲2">
    <img src="素材/背景圖/祥雲2.png" class="cloud-float c4" alt="祥雲2">

    <!-- 彼岸花 -->
    <div class="flower-bg-layer">
        <img src="素材/背景圖/彼岸花.png" class="center-flower" alt="彼岸花">
    </div>

    <!-- 左右兩側直書日期 -->
    <div class="date-text date-left">令和八年</div>
    <div class="date-text date-right">八月二十一日</div>

    <!-- 主視覺中心區域 -->
    <div class="container">
        <img src="素材/背景圖/蓮花logo.png" class="top-logo" alt="蓮花logo">
        <h1>波羅夷 空却</h1>
        <p class="subtitle">お誕生日おめでとう！</p>
    </div>

    <!-- 空嚴寺章 -->
    <img src="素材/背景圖/空嚴寺章.png" class="stamp-right-bottom" alt="空嚴寺章">

    <script src="script.js"></script>
</body>
</html>
