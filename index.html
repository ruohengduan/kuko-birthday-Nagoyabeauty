<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>波羅夷 空却 HBD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 開眼特效 -->
    <div id="audio-unlocker">
        <div class="eyelid top-eyelid"></div>
        <div class="eyelid bottom-eyelid"></div>
        <div class="unlock-prompt">點擊螢幕 爆誕開眼！</div>
    </div>

    <!-- 內容區域 -->
    <div class="container">
        <img src="蓮花logo.png" class="top-logo" alt="logo">
        
        <!-- 祥雲圖片放在這裡，確保它會顯示 -->
        <div class="cloud-container">
            <img src="祥雲.png" class="cloud-img" alt="祥雲">
        </div>

        <h1>波羅夷 空却</h1>
        <p class="subtitle">お誕生日おめでとう！</p>
    </div>

    <!-- 爆誕文字 (由 JS 控制出現) -->
    <div id="blast-text" class="epic-explosion">爆誕！！！！</div>

    <script src="script.js"></script>
</body>
</html>
